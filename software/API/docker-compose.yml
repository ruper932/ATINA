services:
  api:
    build: .
    container_name: siswork_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: siswork_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: siswork
      POSTGRES_USER: siswork
      POSTGRES_PASSWORD: siswork
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siswork -d siswork"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
