<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>

  <!-- Hoja estilizada -->
  <path d="M 50 15 
           C 50 15, 30 35, 30 50 
           C 30 65, 40 75, 50 85 
           C 60 75, 70 65, 70 50 
           C 70 35, 50 15, 50 15 Z" 
        fill="url(#grad)"/>

  <!-- Vena central de la hoja -->
  <line x1="50" y1="25" x2="50" y2="75" stroke="white" stroke-width="2" opacity="0.6"/>

  <!-- Venas laterales -->
  <line x1="50" y1="40" x2="40" y2="45" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="50" y1="40" x2="60" y2="45" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="50" y1="55" x2="38" y2="58" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="50" y1="55" x2="62" y2="58" stroke="white" stroke-width="1.5" opacity="0.4"/>

  <!-- Gota de agua -->
  <circle cx="50" cy="95" r="4" fill="#3b82f6" opacity="0.8"/>
</svg>