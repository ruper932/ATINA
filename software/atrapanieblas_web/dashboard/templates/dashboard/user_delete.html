<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar usuario</title>
    <style>
        body {
            margin: 0;
            font-family: Inter, sans-serif;
            background: #f4f1ec;
            color: #2f2a24;
        }
        .page {
            max-width: 640px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .card {
            background: #fbfaf7;
            border: 1px solid #ddd7cf;
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 16px 40px rgba(43,36,30,0.08);
        }
        h1 {
            margin-top: 0;
        }
        .warning {
            background: #f7ebe8;
            color: #8b4d3d;
            border-radius: 12px;
            padding: 14px;
            margin: 18px 0;
        }
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }
        .btn-danger {
            background: #8b4d3d;
            color: white;
        }
        .btn-secondary {
            background: transparent;
            color: #2f2a24;
            border: 1px solid #d8d2ca;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <h1>Eliminar usuario</h1>
            <p>Estás a punto de eliminar al usuario <strong>{{ user_obj.username }}</strong>.</p>

            <div class="warning">
                Esta acción no se puede deshacer.
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="actions">
                    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                    <a href="/biometric/admin-panel/users/" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
