<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear usuario</title>
    <style>
        body {
            margin: 0;
            font-family: Inter, sans-serif;
            background: #f4f1ec;
            color: #2f2a24;
        }
        .page {
            max-width: 720px;
            margin: 0 auto;
            padding: 32px 20px;
        }
        .card {
            background: #fbfaf7;
            border: 1px solid #ddd7cf;
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 16px 40px rgba(43,36,30,0.08);
        }
        h1 {
            margin-top: 0;
        }
        form {
            display: grid;
            gap: 16px;
        }
        label {
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #d8d2ca;
            background: #f8f6f2;
        }
        .checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .btn {
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }
        .btn-primary {
            background: #6f8f88;
            color: white;
        }
        .btn-secondary {
            background: transparent;
            color: #2f2a24;
            border: 1px solid #d8d2ca;
        }
        .messages {
            margin-bottom: 18px;
        }
        .message {
            padding: 12px 14px;
            border-radius: 12px;
            margin-bottom: 10px;
            background: #f7ebe8;
            color: #8b4d3d;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <h1>Crear usuario</h1>
            <p>Registra un nuevo usuario para el sistema.</p>

            {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                        <div class="message">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div>
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div>
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email">
                </div>

                <div>
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="checkbox">
                    <input type="checkbox" id="is_staff" name="is_staff">
                    <label for="is_staff">Con permisos administrativos</label>
                </div>

                <div class="actions">
                    <button type="submit" class="btn btn-primary">Guardar usuario</button>
                    <a href="/biometric/admin-panel/users/" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
