<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login facial</title>
</head>
<body>
    <h1>Login con reconocimiento facial</h1>

    <video id="video" width="640" height="480" autoplay></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <form id="face-login-form" method="post">
        {% csrf_token %}
        <input type="hidden" name="image_data" id="image_data">
        <button type="submit">Iniciar sesión con rostro</button>
    </form>

    <div id="status"></div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const imageDataInput = document.getElementById('image_data');
        const form = document.getElementById('face-login-form');
        const status = document.getElementById('status');

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(error => {
                status.innerHTML = '<p style="color:red;">No se pudo acceder a la cámara: ' + error + '</p>';
            });

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            imageDataInput.value = canvas.toDataURL('image/jpeg');

            const formData = new FormData(form);

            fetch('', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                status.innerHTML = '<p>' + data.message + '</p>';
                if (data.success) {
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                }
            });
        });
    </script>
</body>
</html>
