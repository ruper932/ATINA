<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 380px;
        }
        h1 {
            margin-top: 0;
            font-size: 1.5rem;
            text-align: center;
        }
        label {
            display: block;
            margin-top: 1rem;
            margin-bottom: .4rem;
        }
        input {
            width: 100%;
            padding: .75rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            margin-top: 1.2rem;
            padding: .8rem;
            border: none;
            background: #0d6efd;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }
        .errorlist {
            color: #b00020;
            padding-left: 1rem;
        }
        .helptext {
            font-size: .9rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Iniciar sesión</h1>

        {% if form.errors %}
            <p style="color:red;">Usuario o contraseña incorrectos.</p>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
